name: Update Fork from Upstream

on:
  schedule:
    - cron: '*/5 * * * *' # This runs every 5 minutes
  workflow_dispatch: # Allows you to run it manually whenever you want.

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main # Ensure this matches your fork's default branch name

      - name: Sync upstream changes
        id: sync
        uses: aieri/sync-upstream-repo@v1.3.0
        with:
          upstream_repo: https://github.com/Chris007X/OpenDevis.git
          upstream_branch: main
          target_branch: main # This is your branch
          force: false # Set to true only if you want to overwrite your own changes
